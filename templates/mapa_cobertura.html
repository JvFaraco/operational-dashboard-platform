{% extends "base.html" %}
{% block title %}Mapa de Rotas — A365 Ops{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#005BAC;--yellow:#F5B400;--bg:#0b0f14;--bg2:#111620;--card:#161d2a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --text:#e8edf5;--muted:#7a8aa0;--header-h:64px;--sidebar-w:290px;
}
[data-theme="light"]{--bg:#f0f4f9;--bg2:#e6ecf5;--card:#fff;--border:rgba(0,91,172,.1);--border2:rgba(0,91,172,.2);--text:#0d1a2e;--muted:#5a6e8a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

.header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:var(--header-h);background:var(--navy);box-shadow:0 2px 24px rgba(0,0,0,.45);flex-shrink:0;z-index:100;}
.logo-link{text-decoration:none;display:flex;flex-direction:column;}
.logo-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:18px;color:#fff;letter-spacing:-.5px;}
.logo-tag{font-size:9px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.hbadge{font-size:12px;font-weight:700;background:rgba(255,255,255,.15);color:#fff;padding:4px 12px;border-radius:20px;font-family:'Montserrat',sans-serif;}
.btn-icon{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;}
.btn-icon:hover{background:rgba(255,255,255,.2);color:#fff;}

.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - var(--header-h));}

.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;z-index:10;}
.sidebar-top{padding:14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'Montserrat',sans-serif;}
.search-box{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;padding:7px 12px;outline:none;font-family:'Montserrat',sans-serif;transition:border-color .2s;}
.search-box:focus{border-color:var(--yellow);}
.stats-row{display:flex;gap:5px;margin-top:8px;}
.stat-chip{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center;}
.stat-val{font-size:15px;font-weight:700;color:var(--yellow);font-family:'Montserrat',sans-serif;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.filter-row{display:flex;gap:6px;margin-top:8px;}
.sel-sm{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:11px;padding:6px 8px;outline:none;font-family:'Montserrat',sans-serif;cursor:pointer;}
.sel-sm:focus{border-color:var(--yellow);}
.btn-reset{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:.18s;white-space:nowrap;}
.btn-reset:hover{border-color:var(--yellow);color:var(--yellow);}

.route-list{flex:1;overflow-y:auto;padding:6px;}
.route-list::-webkit-scrollbar{width:3px;}
.route-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.route-group-header{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 8px 3px;font-family:'Montserrat',sans-serif;}
.route-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:1px;}
.route-item:hover{background:rgba(255,255,255,.04);}
.route-item.active{background:rgba(255,255,255,.07);border-color:var(--border2);}
.route-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.route-name{font-size:11px;color:var(--muted);flex:1;font-family:'Montserrat',sans-serif;transition:color .12s;}
.route-item.active .route-name{color:var(--text);font-weight:600;}
.route-count{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg2);padding:1px 6px;border-radius:10px;}
.route-item.active .route-count{color:var(--yellow);}

.special-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:1px;}
.sem-epv-item{background:rgba(192,57,43,.07);border-color:rgba(192,57,43,.2);}
.sem-epv-item:hover{background:rgba(192,57,43,.13);}
.sem-epv-item.active{background:rgba(192,57,43,.18);border-color:rgba(192,57,43,.4);}
.filiais-item{background:rgba(245,180,0,.06);border-color:rgba(245,180,0,.18);}
.filiais-item:hover{background:rgba(245,180,0,.1);}
.filiais-item.active{background:rgba(245,180,0,.14);border-color:rgba(245,180,0,.35);}
.special-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.special-name{font-size:11px;flex:1;font-family:'Montserrat',sans-serif;font-weight:600;}
.sem-epv-item .special-name{color:var(--muted);}
.sem-epv-item.active .special-name{color:#e74c3c;}
.filiais-item .special-name{color:var(--muted);}
.filiais-item.active .special-name{color:var(--yellow);}
.special-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.sem-epv-item .special-count{color:var(--muted);background:var(--bg2);}
.sem-epv-item.active .special-count{color:#e74c3c;background:rgba(192,57,43,.15);}
.filiais-item .special-count{color:var(--muted);background:var(--bg2);}
.filiais-item.active .special-count{color:var(--yellow);background:rgba(245,180,0,.15);}

.city-panel{border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;max-height:180px;overflow-y:auto;}
.city-panel::-webkit-scrollbar{width:3px;}
.city-panel::-webkit-scrollbar-thumb{background:var(--border2);}
.city-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.city-panel-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:'Montserrat',sans-serif;}
.city-count{font-size:9px;font-weight:700;color:var(--yellow);font-family:'Montserrat',sans-serif;}
.city-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin:2px 1px;border:1px solid;font-family:'Montserrat',sans-serif;cursor:pointer;transition:.12s;}
.city-tag:hover{opacity:.8;}

.main{flex:1;overflow:hidden;position:relative;}
#map{width:100%;height:100%;}
.map-pill{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:800;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:7px 18px;font-size:12px;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.map-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.map-pill-text{font-family:'Montserrat',sans-serif;font-weight:600;color:var(--text);font-size:11px;}
.map-pill-sub{font-size:10px;color:var(--muted);}

.leaflet-popup-content-wrapper{background:var(--card) !important;border:1px solid var(--border2) !important;border-radius:10px !important;box-shadow:0 8px 32px rgba(0,0,0,.5) !important;padding:0 !important;}
.leaflet-popup-tip{background:var(--card) !important;}
.leaflet-popup-content{margin:0 !important;width:260px !important;color:var(--text);font-family:'Montserrat',sans-serif;}
.popup-header{border-radius:9px 9px 0 0;padding:10px 14px;}
.popup-cidade{font-weight:700;font-size:13px;color:#fff;}
.popup-estado{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;}
.popup-body{padding:11px 14px;display:flex;flex-direction:column;gap:9px;background:var(--card);border-radius:0 0 9px 9px;}
.popup-stitle{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;font-family:'Montserrat',sans-serif;}
.popup-tags{display:flex;flex-wrap:wrap;gap:3px;max-height:64px;overflow-y:auto;}
.popup-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border2);}
.popup-bairros{font-size:10px;color:var(--muted);line-height:1.6;max-height:60px;overflow-y:auto;}

.pin{width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.4);box-shadow:0 3px 8px rgba(0,0,0,.5);cursor:pointer;}
.pin-red{background:#c0392b;box-shadow:0 3px 8px rgba(192,57,43,.6);}
.pin-filial{width:24px;height:24px;background:#F5B400;border:2.5px solid rgba(255,255,255,.6);box-shadow:0 3px 12px rgba(245,180,0,.5);}
.pin-sede{width:28px;height:28px;background:#FFC72C;border:3px solid #fff;box-shadow:0 3px 16px rgba(255,199,44,.7);}

.cluster-c{border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.35);font-family:'Montserrat',sans-serif;}
.cluster-purple-c{background:#8B5CF6;box-shadow:0 2px 8px rgba(139,92,246,.5);border:2px solid rgba(255,255,255,.35);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:Montserrat,sans-serif;}
.cluster-red-c{background:#c0392b;box-shadow:0 2px 8px rgba(192,57,43,.5);}

.leaflet-tile-pane{filter:brightness(.82) saturate(.65);}
[data-theme="light"] .leaflet-tile-pane{filter:none;}

.sem-bairros-item{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.2);}
.sem-bairros-item:hover{background:rgba(139,92,246,.13);}
.sem-bairros-item.active{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.4);}
.sem-bairros-item .special-name{color:var(--muted);}
.sem-bairros-item.active .special-name{color:#8B5CF6;}
.sem-bairros-item .special-count{color:var(--muted);background:var(--bg2);}
.sem-bairros-item.active .special-count{color:#8B5CF6;background:rgba(139,92,246,.15);}
.cluster-purple-c{background:#8B5CF6;box-shadow:0 2px 8px rgba(139,92,246,.5);}
</style>
{% endblock %}

{% block content %}
<header class="header">
  <a href="{{ url_for('home') }}" class="logo-link">
    <div class="logo-name">A365 Ops</div>
    <div class="logo-tag">Mapa de Rotas</div>
  </a>
  <div class="header-right">
    <span class="hbadge" id="headerBadge">carregando...</span>
    <button class="btn-icon" id="themeToggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">Buscar</div>
      <input class="search-box" id="searchInput" placeholder="Rota, cidade, estado...">
      <div class="stats-row">
        <div class="stat-chip"><div class="stat-val" id="sC">—</div><div class="stat-lbl">Cidades</div></div>
        <div class="stat-chip"><div class="stat-val" id="sR">—</div><div class="stat-lbl">Rotas</div></div>
        <div class="stat-chip"><div class="stat-val" id="sE">—</div><div class="stat-lbl">EPVs</div></div>
      </div>
      <div class="filter-row">
        <select class="sel-sm" id="filtroEstado"><option value="">Todos os estados</option></select>
        <button class="btn-reset" id="btnReset">↺ Limpar</button>
      </div>
      <select class="sel-sm" id="filtroEPV" style="margin-top:6px;width:100%"><option value="">Todos os especialistas</option></select>
    </div>
    <div class="route-list" id="routeList"></div>
    <div class="city-panel" id="cityPanel" style="display:none">
      <div class="city-panel-header">
        <span class="city-panel-title">Cidades</span>
        <span class="city-count" id="cityCount"></span>
      </div>
      <div id="cityContent"></div>
    </div>
  </aside>

  <main class="main">
    <div id="map"></div>
    <div class="map-pill" id="mapPill" style="display:none">
      <div class="map-pill-dot" id="pillDot"></div>
      <span class="map-pill-text" id="pillText"></span>
      <span class="map-pill-sub" id="pillSub"></span>
    </div>
  </main>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// Tema
(function(){
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('a365-theme',t);}
  applyTheme(localStorage.getItem('a365-theme')||'dark');
  document.getElementById('themeToggle').addEventListener('click',()=>{
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  });
})();

// Estado
let dados=[], filiais=[], rotaAtiva=null, mostrarFiliais=true, filtroEstado='', busca='', filtraSemBairros=false;
let map, cBlue, cRed, cPurple, mRotas=[], mFiliais=[], cores={}, todasRotas=[];

function gerarCores(n){
  const hues=[210,160,40,280,10,190,320,80,240,0,140,60,300,170,350,100,220,50,260,130,30,270,110,330,70];
  return Array.from({length:n},(_,i)=>`hsl(${(hues[i%hues.length]+Math.floor(i/hues.length)*43)%360},${60+i%3*10}%,${55+i%2*7}%)`);
}

function initMap(){
  map=L.map('map',{center:[-18,-48],zoom:5,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);

  const mkCluster=(colorFn,cls)=>L.markerClusterGroup({maxClusterRadius:50,iconCreateFunction:c=>L.divIcon({
    html:`<div class="cluster-c ${cls}" style="${colorFn()}">${c.getChildCount()}</div>`,
    className:'',iconSize:[32,32],iconAnchor:[16,16]
  })});

  cBlue=mkCluster(()=>`background:${rotaAtiva&&rotaAtiva!=='__sem_epv__'?cores[rotaAtiva]:'#005BAC'};box-shadow:0 2px 8px ${rotaAtiva&&rotaAtiva!=='__sem_epv__'?cores[rotaAtiva]+'70':'rgba(0,91,172,.5)'}`,'' );
  cRed=mkCluster(()=>'','cluster-red-c');
  cPurple=mkCluster(()=>'','cluster-purple-c');
  map.addLayer(cBlue);
  map.addLayer(cRed);
  map.addLayer(cPurple);
}

function icone(cor,semEpv){
  if(semEpv) return L.divIcon({className:'',html:'<div class="pin pin-red"></div>',iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]});
  return L.divIcon({className:'',html:`<div class="pin" style="background:${cor}"></div>`,iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]});
}
function iconeRoxo(){
  return L.divIcon({className:'',html:'<div class="pin" style="background:#8B5CF6"></div>',iconSize:[20,20],iconAnchor:[10,20],popupAnchor:[0,-22]});
}
function iconeFilial(tipo){
  const cls=tipo==='sede'?'pin pin-filial pin-sede':'pin pin-filial';
  const s=tipo==='sede'?[28,28]:[24,24];
  return L.divIcon({className:'',html:`<div class="${cls}"></div>`,iconSize:s,iconAnchor:[s[0]/2,s[0]],popupAnchor:[0,-s[0]]});
}

function popup(d,cor){
  const rotas=d.rotas.map(r=>`<span class="popup-tag" style="border-color:${cores[r]||'#fff'}40;color:${cores[r]||'var(--text)'}">${r.replace('A365 ','')}</span>`).join('');
  const epvs=d.epvs.length?d.epvs.map(e=>`<span class="popup-tag">${e}</span>`).join(''):'<span style="color:#e74c3c;font-size:10px">Sem EPV vinculado</span>';
  return `<div class="popup-header" style="background:${cor||'#005BAC'}"><div class="popup-cidade">${d.cidade}</div><div class="popup-estado">${d.estado}</div></div>
  <div class="popup-body">
    <div><div class="popup-stitle" style="color:${cor||'var(--yellow)'}">Rotas</div><div class="popup-tags">${rotas}</div></div>
    <div><div class="popup-stitle" style="color:${cor||'var(--yellow)'}">Especialistas</div><div class="popup-tags">${epvs}</div></div>
    <div><div class="popup-stitle" style="color:${cor||'var(--yellow)'}">Bairros (${d.bairros.length})</div><div class="popup-bairros">${d.bairros.join(', ')||'—'}</div></div>
  </div>`;
}
function popupFilial(f){
  return `<div class="popup-header" style="background:#F5B400"><div class="popup-cidade" style="color:#0b0f14">${f.nome}</div><div class="popup-estado" style="color:rgba(0,0,0,.6)">${f.tipo==='sede'?'⭐ Sede Regional':'Filial'} · ${f.cidade}/${f.estado}</div></div>
  <div class="popup-body"><div><div class="popup-stitle">Endereço</div><div style="font-size:11px">${f.endereco}${f.cep?'<br><span style="color:var(--muted)">CEP: '+f.cep+'</span>':''}</div></div></div>`;
}

function plotar(){
  cBlue.clearLayers(); cRed.clearLayers(); cPurple.clearLayers();
  mRotas.forEach(m=>{if(map.hasLayer(m))map.removeLayer(m);});
  mRotas=[];

  const epvFiltro=document.getElementById('filtroEPV')?.value||'';

  let ds=dados;
  if(filtroEstado) ds=ds.filter(d=>d.estado===filtroEstado);
  if(rotaAtiva==='__sem_epv__')    ds=ds.filter(d=>!d.epvs||!d.epvs.length);
  else if(rotaAtiva)               ds=ds.filter(d=>d.rotas.includes(rotaAtiva));
  else if(busca.trim()){
    const b=busca.toLowerCase().trim();
    ds=ds.filter(d=>d.cidade.toLowerCase().includes(b)||d.estado.toLowerCase().includes(b)||d.rotas.some(r=>r.toLowerCase().includes(b))||d.epvs.some(e=>e.toLowerCase().includes(b)));
  }
  if(epvFiltro) ds=ds.filter(d=>d.epvs.includes(epvFiltro));

  const bounds=[];
  const cor=rotaAtiva&&rotaAtiva!=='__sem_epv__'&&!filtraSemBairros?cores[rotaAtiva]:null;

  ds.forEach(d=>{
    if(!d.lat||!d.lng) return;
    const semEpv=!d.epvs||!d.epvs.length;
    const semBairros=!d.bairros||!d.bairros.length;

    if(rotaAtiva==='__sem_epv__'){
      // Modo sem EPV: só vermelhos
      const m=L.marker([d.lat,d.lng],{icon:icone('#c0392b',true)}).bindPopup(popup(d,'#c0392b'),{maxWidth:280});
      cRed.addLayer(m); mRotas.push(m); bounds.push([d.lat,d.lng]);
    } else {
      if(semEpv) return; // oculta vermelhos sempre (exceto modo sem EPV)
      const c=cor||(d.rotas[0]?cores[d.rotas[0]]:'#005BAC');
      // Sem bairros ativo: roxo se sem bairros, azul se tem bairros
      if(filtraSemBairros && semBairros){
        const m=L.marker([d.lat,d.lng],{icon:iconeRoxo()}).bindPopup(popup(d,'#8B5CF6'),{maxWidth:280});
        cPurple.addLayer(m); mRotas.push(m); bounds.push([d.lat,d.lng]);
      } else {
        const m=L.marker([d.lat,d.lng],{icon:icone(c,false)}).bindPopup(popup(d,c),{maxWidth:280});
        cBlue.addLayer(m); mRotas.push(m); bounds.push([d.lat,d.lng]);
      }
    }
  });

  if(bounds.length===1) map.setView(bounds[0],12,{animate:true});
  else if(bounds.length>1) map.fitBounds(bounds,{padding:[40,40],maxZoom:13,animate:true});

  document.getElementById('sC').textContent=ds.length;
  document.getElementById('sR').textContent=new Set(ds.flatMap(d=>d.rotas)).size;
  document.getElementById('sE').textContent=new Set(ds.flatMap(d=>d.epvs)).size;
  document.getElementById('headerBadge').textContent=ds.length+' cidades';

  const pill=document.getElementById('mapPill');
  const pillAtivo=rotaAtiva||filtraSemBairros||busca.trim()||epvFiltro;
  if(pillAtivo){
    pill.style.display='flex';
    const c2=rotaAtiva==='__sem_epv__'?'#e74c3c':filtraSemBairros?'#8B5CF6':(rotaAtiva?cores[rotaAtiva]||'#005BAC':'#005BAC');
    document.getElementById('pillDot').style.background=c2;
    document.getElementById('pillText').textContent=rotaAtiva==='__sem_epv__'?'Sem EPV':filtraSemBairros?'Sem bairros':rotaAtiva?rotaAtiva.replace('A365 ',''):epvFiltro||busca;
    document.getElementById('pillSub').textContent=ds.length+' cidade'+(ds.length!==1?'s':'');
  } else { pill.style.display='none'; }

  const panel=document.getElementById('cityPanel');
  if(pillAtivo&&ds.length){
    const cor2=rotaAtiva==='__sem_epv__'?'#e74c3c':filtraSemBairros?'#8B5CF6':(rotaAtiva?cores[rotaAtiva]||'#005BAC':'#005BAC');
    document.getElementById('cityCount').textContent=ds.length;
    const epvsRota=[...new Set(ds.flatMap(d=>d.epvs))].sort();
    const epvHtml=epvsRota.length&&!epvFiltro
      ? '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border2)"><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Especialistas</div>'+
        epvsRota.map(e=>`<span class="city-tag" style="color:#fff;border-color:${cor2}60;background:${cor2}20;cursor:default">${e}</span>`).join('')+'</div>'
      : '';
    document.getElementById('cityContent').innerHTML=epvHtml+ds.map(d=>`<span class="city-tag" style="color:${cor2};border-color:${cor2}40;background:${cor2}12" title="${d.estado}">${d.cidade}</span>`).join('');
    panel.style.display='block';
  } else { panel.style.display='none'; }
}

function plotarFiliais(){
  mFiliais.forEach(m=>{if(map.hasLayer(m))map.removeLayer(m);});
  mFiliais=[];
  if(!mostrarFiliais)return;
  filiais.forEach(f=>{
    if(!f.lat||!f.lng)return;
    const m=L.marker([f.lat,f.lng],{icon:iconeFilial(f.tipo),zIndexOffset:1000}).bindPopup(popupFilial(f),{maxWidth:260});
    m.addTo(map); mFiliais.push(m);
  });
}

function renderList(){
  const list=document.getElementById('routeList');
  const b=busca.toLowerCase();
  const ds=filtroEstado?dados.filter(d=>d.estado===filtroEstado):dados;

  const grupos={};
  todasRotas.forEach(r=>{
    const m=r.match(/A365 (\w+)/);
    const g=m?m[1]:'OUTROS';
    if(!grupos[g])grupos[g]=[];
    grupos[g].push(r);
  });

  const semEpvCount=ds.filter(d=>!d.epvs||!d.epvs.length).length;
  let html='';

  // Especiais
  if(!b||'sem epv sem tecnico'.includes(b)){
    const a=rotaAtiva==='__sem_epv__'?'active':'';
    html+=`<div class="special-item sem-epv-item ${a}" data-rota="__sem_epv__">
      <div class="special-dot" style="background:#e74c3c"></div>
      <span class="special-name">Sem EPV Vinculado</span>
      <span class="special-count">${semEpvCount}</span>
    </div>`;
  }
  if(!b||'sem bairros'.includes(b)){
    const sbCount=ds.filter(d=>!d.bairros||!d.bairros.length).length;
    const a=filtraSemBairros?'active':'';
    html+=`<div class="special-item sem-bairros-item ${a}" id="toggleSemBairros">
      <div class="special-dot" style="background:#8B5CF6"></div>
      <span class="special-name">Sem Bairros</span>
      <span class="special-count">${sbCount}</span>
    </div>`;
  }
    if(!b||'filiais orsegups'.includes(b)){
    const a=mostrarFiliais?'active':'';
    html+=`<div class="special-item filiais-item ${a}" id="toggleFiliais">
      <div class="special-dot" style="background:var(--yellow)"></div>
      <span class="special-name">Filiais Orsegups</span>
      <span class="special-count">${filiais.length}</span>
    </div>`;
  }

  // Rotas
  Object.entries(grupos).sort().forEach(([g,rs])=>{
    const rs2=rs.filter(r=>{
      if(b){
        const rotaMatch=r.toLowerCase().includes(b)||g.toLowerCase().includes(b);
        const cidadeMatch=ds.some(d=>d.rotas.includes(r)&&(d.cidade.toLowerCase().includes(b)||d.estado.toLowerCase().includes(b)));
        if(!rotaMatch&&!cidadeMatch)return false;
      }
      return ds.some(d=>d.rotas.includes(r));
    });
    if(!rs2.length)return;
    html+=`<div class="route-group-header">${g}</div>`;
    rs2.forEach((r,i)=>{
      const c=cores[r]||'#005BAC';
      const n=ds.filter(d=>d.rotas.includes(r)).length;
      const a=rotaAtiva===r?'active':'';
      html+=`<div class="route-item ${a}" data-rota="${r}" style="animation-delay:${i*.015}s">
        <div class="route-dot" style="background:${c}"></div>
        <span class="route-name">${r.replace('A365 ','')}</span>
        <span class="route-count">${n}</span>
      </div>`;
    });
  });

  list.innerHTML=html;

  list.querySelectorAll('[data-rota]').forEach(el=>{
    el.addEventListener('click',()=>{
      const r=el.dataset.rota;
      rotaAtiva=rotaAtiva===r?null:r;
      renderList(); plotar();
    });
  });
  const tf=document.getElementById('toggleFiliais');
  if(tf) tf.addEventListener('click',()=>{mostrarFiliais=!mostrarFiliais;plotarFiliais();renderList();});
  const tsb=document.getElementById('toggleSemBairros');
  if(tsb) tsb.addEventListener('click',()=>{filtraSemBairros=!filtraSemBairros;rotaAtiva=null;renderList();plotar();});
}

// Filtros
document.getElementById('searchInput').addEventListener('input',e=>{busca=e.target.value;rotaAtiva=null;filtraSemBairros=false;renderList();plotar();});
document.getElementById('filtroEstado').addEventListener('change',e=>{filtroEstado=e.target.value;renderList();plotar();});
document.getElementById('btnReset').addEventListener('click',()=>{
  rotaAtiva=null;filtroEstado='';busca='';mostrarFiliais=true;filtraSemBairros=false;
  document.getElementById('filtroEstado').value='';
  document.getElementById('filtroEPV').value='';
  document.getElementById('searchInput').value='';
  renderList();plotar();plotarFiliais();
  map.setView([-18,-48],5,{animate:true});
});

async function init(){
  initMap();
  const [r1,r2]=await Promise.all([fetch('/api/mapa-cobertura'),fetch('/api/filiais-orsegups')]);
  dados=await r1.json(); filiais=await r2.json();
  todasRotas=[...new Set(dados.flatMap(d=>d.rotas))].sort();
  const pal=gerarCores(todasRotas.length);
  todasRotas.forEach((r,i)=>cores[r]=pal[i]);
  const estados=[...new Set(dados.map(d=>d.estado))].sort();
  const sel=document.getElementById('filtroEstado');
  estados.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;sel.appendChild(o);});
  const epvs=[...new Set(dados.flatMap(d=>d.epvs))].sort();
  const selEpv=document.getElementById('filtroEPV');
  epvs.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;selEpv.appendChild(o);});
  selEpv.addEventListener('change',()=>{rotaAtiva=null;renderList();plotar();});
  renderList(); plotar(); plotarFiliais();
}
document.addEventListener('DOMContentLoaded',init);
</script>
{% endblock %}
